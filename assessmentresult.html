<body>

  <ul>
    <li><a href="Home.html">Home</a></li>

  <p class="score">Your Score Is:</p><br>
  <div class="score" id="score"></div>

  <p id="message"></p>
<p id="message2"></p>
<p id="message3"></p>
<p id="message4"></p>

<p id="advice"></p>


<script>

let score = parseInt(localStorage.getItem("score"));

document.getElementById("score").innerHTML = score;

let message = "";
let message2 = "";
let message3 = "";
let message4 = "";

let advice = "";


if(score >= 18 && score <= 36){

    message =
    "Good screen usage. Keep it Up!";

}

else if(score > 36 && score <= 54){

    message2 =
    "Moderate Screen Usage. Try to restrict screen usage a step more.";

    advice = 
    "In order to reduce your screen usage you can try methods like:<br><br> 1) Establishing any goal(s)that you wish to complete, or a lifestyle you wish to follow- these goals may be academic, related to hobbies or physical health.<br> 2) Regularly practise the 20-20-20 rule when online for a prolonged time."
}

else if(score > 54 && score <= 72){

    message3 =
    "Poor Screen Usage. Let's try harder to reduce screen usage even more.";

    advice = "If you want to change your screen time habits: <br> 1) "
}

else if(score > 72 && score <= 90){

    message4 =
    "Severely High Screen Usage and Dependency";

    advice = 
    "It is very important that you try to change your habits, mindset and attitude so that you can be benefitted later in life and get rid of your bad habits.<br> To get the best suggestions, check the solutions page"
}



document.getElementById("message4").innerHTML = message;

document.getElementById("message3").innerHTML = message2;

document.getElementById("message2").innerHTML = message3;

document.getElementById("message").innerHTML = message4;

document.getElementById("advice").innerHTML = advice;

</script>
</body>
